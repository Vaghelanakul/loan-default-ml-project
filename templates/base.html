<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Loan Default Predictor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #eef4ff;
            --bg-secondary: #deebff;
            --bg-card: rgba(255, 255, 255, 0.88);
            --bg-card-hover: rgba(255, 255, 255, 0.98);
            --card-bg: rgba(255, 255, 255, 0.74);
            --glass-bg: var(--bg-card);
            --text-primary: #11203b;
            --text-secondary: #4c6182;
            --accent-1: #2563eb;
            --accent-2: #06b6d4;
            --accent-3: #22c55e;
            --accent-4: #2563eb;
            --gradient-1: linear-gradient(125deg, #2563eb 0%, #06b6d4 55%, #22c55e 100%);
            --gradient-2: linear-gradient(125deg, #0f172a 0%, #2563eb 100%);
            --gradient-3: linear-gradient(125deg, #22c55e 0%, #2563eb 100%);
            --border-glow: rgba(37, 99, 235, 0.3);
            --border-color: rgba(17, 32, 59, 0.14);
            --shadow-glow: 0 18px 45px rgba(17, 32, 59, 0.16);
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #ca8a04;
            --info: #0284c7;
        }

        [data-theme="dark"] {
            --bg-primary: #0a1324;
            --bg-secondary: #111d34;
            --bg-card: rgba(17, 29, 52, 0.76);
            --bg-card-hover: rgba(23, 38, 66, 0.92);
            --card-bg: rgba(20, 35, 62, 0.6);
            --glass-bg: var(--bg-card);
            --text-primary: #e8efff;
            --text-secondary: #9eb0d4;
            --border-glow: rgba(6, 182, 212, 0.32);
            --border-color: rgba(232, 239, 255, 0.14);
            --shadow-glow: 0 20px 56px rgba(0, 0, 0, 0.46);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            background:
                radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.24), transparent 35%),
                radial-gradient(circle at 100% 0%, rgba(6, 182, 212, 0.22), transparent 38%),
                radial-gradient(circle at 45% 100%, rgba(34, 197, 94, 0.2), transparent 36%),
                var(--bg-primary);
            letter-spacing: 0.005em;
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -3;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at center, black 42%, transparent 90%);
        }

        [data-theme="light"] .mesh-bg {
            background-image:
                linear-gradient(rgba(17, 32, 59, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 32, 59, 0.06) 1px, transparent 1px);
        }

        .orb-container {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(95px);
            opacity: 0.5;
            animation: orbital 18s ease-in-out infinite;
        }

        .orb-1 {
            width: 360px;
            height: 360px;
            top: -7%;
            left: 10%;
            background: rgba(37, 99, 235, 0.55);
        }

        .orb-2 {
            width: 320px;
            height: 320px;
            right: -7%;
            top: 42%;
            background: rgba(6, 182, 212, 0.52);
            animation-delay: -6s;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            left: 28%;
            bottom: -9%;
            background: rgba(34, 197, 94, 0.45);
            animation-delay: -11s;
        }

        @keyframes orbital {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(26px, -20px) scale(1.08);
            }

            66% {
                transform: translate(-18px, 24px) scale(0.92);
            }
        }

        .grid-pattern {
            display: none;
        }

        .navbar {
            width: min(1180px, calc(100% - 1.6rem));
            margin: 16px auto 0;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--shadow-glow);
            transition: all 0.25s ease;
        }

        .navbar.scrolled {
            transform: translateY(-2px);
            box-shadow: 0 24px 44px rgba(9, 15, 30, 0.45);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--text-primary) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.01em;
        }

        .navbar-brand .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            color: #fff;
            background: var(--gradient-1);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.34);
            clip-path: polygon(15% 0, 85% 0, 100% 50%, 85% 100%, 15% 100%, 0 50%);
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 600;
            padding: 0.56rem 1rem !important;
            border-radius: 999px;
            margin: 0 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text-primary) !important;
            background: rgba(37, 99, 235, 0.12);
        }

        .nav-link.active {
            color: #fff !important;
            background: var(--gradient-2);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }

        .theme-toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            display: grid;
            place-items: center;
            transition: all 0.2s ease;
        }

        .theme-toggle-btn:hover {
            color: var(--text-primary);
        }

        .theme-toggle-btn.active {
            color: #fff;
            background: var(--gradient-1);
            box-shadow: 0 8px 18px rgba(6, 182, 212, 0.35);
        }

        .main-content {
            padding: 52px 0 58px;
            min-height: calc(100vh - 140px);
        }

        .glass-card {
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            border-radius: 26px;
            box-shadow: var(--shadow-glow);
            overflow: hidden;
            transition: all 0.28s ease;
            position: relative;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 26px;
            pointer-events: none;
            border: 1px solid transparent;
            background: linear-gradient(130deg, rgba(37, 99, 235, 0.22), rgba(6, 182, 212, 0.18), rgba(34, 197, 94, 0.18)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.35;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: 0 26px 50px rgba(0, 0, 0, 0.34);
        }

        .card-header-custom {
            background: linear-gradient(100deg, rgba(37, 99, 235, 0.95), rgba(6, 182, 212, 0.9));
            padding: 22px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .card-header-custom h2 {
            color: #fff;
            margin: 0;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .card-body-custom {
            padding: 30px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 44px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.05rem, 4.8vw, 3.25rem);
            margin-bottom: 10px;
            line-height: 1.15;
        }

        .page-header h1 i {
            margin-right: 10px;
            color: var(--accent-2);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .glow-text {
            text-shadow: 0 0 22px rgba(6, 182, 212, 0.18);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-primary);
            margin-bottom: 9px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: var(--accent-2);
            width: 18px;
            text-align: center;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.18);
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.98);
            color: #11203b;
        }

        [data-theme="dark"] .form-control:focus,
        [data-theme="dark"] .form-select:focus {
            background: rgba(20, 35, 62, 0.88);
            color: var(--text-primary);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px dashed var(--border-color);
        }

        .section-title .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: #fff;
            background: var(--gradient-3);
        }

        .section-title h5 {
            margin: 0;
            font-size: 1.16rem;
            font-weight: 700;
        }

        .btn-primary-custom {
            border: none;
            border-radius: 14px;
            padding: 14px 26px;
            background: var(--gradient-1);
            color: #fff;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-primary-custom:hover {
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.33);
        }

        .btn-secondary-custom {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 26px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-secondary-custom:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            border-color: var(--accent-2);
            background: rgba(6, 182, 212, 0.14);
        }

        .stat-card {
            border: 1px solid var(--border-color);
            border-radius: 18px;
            background: var(--bg-card);
            padding: 20px;
            text-align: center;
            transition: all 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(8, 14, 28, 0.28);
        }

        .stat-card .stat-icon {
            width: 62px;
            height: 62px;
            border-radius: 18px;
            margin: 0 auto 12px;
            background: rgba(37, 99, 235, 0.16);
            color: var(--accent-1);
            display: grid;
            place-items: center;
            font-size: 1.52rem;
        }

        .stat-card h3 {
            font-size: 1.56rem;
            margin-bottom: 2px;
            font-weight: 800;
        }

        .stat-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .feature-list li {
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .feature-list li:last-child {
            border-bottom: none;
        }

        .feature-list li i {
            color: var(--accent-3);
        }

        .text-primary-custom {
            color: var(--accent-1) !important;
        }

        .text-secondary-custom {
            color: var(--accent-2) !important;
        }

        .bg-primary-custom {
            background: var(--gradient-2) !important;
            border: none;
            color: #fff;
        }

        .footer {
            width: min(1180px, calc(100% - 1.6rem));
            margin: 0 auto 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            border-radius: 16px;
            text-align: center;
            padding: 16px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            color: var(--accent-1);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #2563eb, #06b6d4);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.48);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 992px) {
            .navbar {
                border-radius: 18px;
            }

            .navbar-brand {
                font-size: 1.3rem;
            }

            .main-content {
                padding-top: 32px;
            }
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }

            .card-body-custom {
                padding: 20px;
            }

            .card-header-custom {
                padding: 18px 20px;
            }

            .orb {
                opacity: 0.32;
                filter: blur(105px);
            }

            .footer {
                border-radius: 12px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="mesh-bg"></div>
    <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-pattern"></div>

    <nav class="navbar navbar-expand-lg" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="/">
                <div class="brand-icon">
                    <i class="fas fa-wave-square"></i>
                </div>
                Loan Default Predictor
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars" style="color: var(--text-primary); font-size: 1.35rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'about' %}active{% endif %}" href="/about">
                            <i class="fas fa-info-circle"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'stats' %}active{% endif %}" href="/stats">
                            <i class="fas fa-chart-pie"></i> Statistics
                        </a>
                    </li>
                </ul>
                <div class="theme-toggle">
                    <button class="theme-toggle-btn" id="darkBtn" title="Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="theme-toggle-btn" id="lightBtn" title="Light Mode">
                        <i class="fas fa-sun"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p><i class="fas fa-graduation-cap" style="color: var(--accent-2);"></i> Semester 6 AI/ML Project | <a
                    href="#">Loan Default Prediction</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const html = document.documentElement;
        const darkBtn = document.getElementById('darkBtn');
        const lightBtn = document.getElementById('lightBtn');

        function updateToggleButtons(theme) {
            if (theme === 'dark') {
                darkBtn.classList.add('active');
                lightBtn.classList.remove('active');
            } else {
                lightBtn.classList.add('active');
                darkBtn.classList.remove('active');
            }
        }

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateToggleButtons(theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        darkBtn.addEventListener('click', () => setTheme('dark'));
        lightBtn.addEventListener('click', () => setTheme('light'));

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('mainNav');
            if (window.scrollY > 24) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const animateElements = document.querySelectorAll('.glass-card, .stat-card, .feature-box, .big-stat-card');
            animateElements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.animation = `fadeInUp 0.55s ease forwards ${index * 0.06}s`;
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
